version: '3.8'

# ============================================================================
# QFieldCloud Self-Hosted for SLTSERP
# Provides unlimited projects and users for OSP fiber optic surveys
# Port: 8100 (QFieldCloud API), 8101 (MinIO S3), 8102 (PostgreSQL)
# ============================================================================

services:
  # PostgreSQL database for QFieldCloud
  qfield-db:
    image: postgis/postgis:16-3.4
    container_name: slt-qfield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qfieldcloud
      POSTGRES_USER: qfield
      POSTGRES_PASSWORD: ${QFIELD_DB_PASSWORD:-qfield_password_change_me}
    volumes:
      - qfield_db_data:/var/lib/postgresql/data
      - ./init-qfield-db.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "8102:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qfield -d qfieldcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-compatible storage for QFieldCloud files
  qfield-storage:
    image: minio/minio:latest
    container_name: slt-qfield-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${QFIELD_STORAGE_USER:-qfield_admin}
      MINIO_ROOT_PASSWORD: ${QFIELD_STORAGE_PASSWORD:-qfield_storage_change_me}
    volumes:
      - qfield_storage_data:/data
    ports:
      - "8101:9000"   # S3 API
      - "9001:9001"    # Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # QFieldCloud Web API
  qfield-api:
    image: opengisch/qfieldcloud:latest
    container_name: slt-qfield-api
    restart: unless-stopped
    depends_on:
      qfield-db:
        condition: service_healthy
      qfield-storage:
        condition: service_healthy
    environment:
      # Django settings
      DEBUG: "false"
      SECRET_KEY: ${QFIELD_SECRET_KEY:-change_this_to_a_long_random_string}
      ALLOWED_HOSTS: ${QFIELD_ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Database
      DATABASE_URL: postgres://qfield:${QFIELD_DB_PASSWORD:-qfield_password_change_me}@qfield-db:5432/qfieldcloud
      
      # Storage (MinIO S3)
      STORAGE_ACCESS_KEY_ID: ${QFIELD_STORAGE_USER:-qfield_admin}
      STORAGE_SECRET_ACCESS_KEY: ${QFIELD_STORAGE_PASSWORD:-qfield_storage_change_me}
      STORAGE_BUCKET_NAME: qfieldcloud
      STORAGE_ENDPOINT: http://qfield-storage:9000
      STORAGE_REGION: us-east-1
      
      # Email (optional - for notifications)
      EMAIL_HOST: ${QFIELD_EMAIL_HOST:-}
      EMAIL_PORT: ${QFIELD_EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${QFIELD_EMAIL_USER:-}
      EMAIL_HOST_PASSWORD: ${QFIELD_EMAIL_PASSWORD:-}
      EMAIL_USE_TLS: "true"
      DEFAULT_FROM_EMAIL: ${QFIELD_FROM_EMAIL:-noreply@slt.lk}
      
      # QFieldCloud settings
      QFIELDCLOUD_HOST: ${QFIELD_HOST:-http://localhost:8100}
      QFIELDCLOUD_ADMIN_USERNAME: ${QFIELD_ADMIN_USER:-admin}
      QFIELDCLOUD_ADMIN_PASSWORD: ${QFIELD_ADMIN_PASS:-admin_change_me}
      QFIELDCLOUD_ADMIN_EMAIL: ${QFIELD_ADMIN_EMAIL:-admin@slt.lk}

    volumes:
      - qfield_media:/app/media
      - qfield_static:/app/static
    ports:
      - "8100:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/status/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # QFieldCloud Worker (background tasks)
  qfield-worker:
    image: opengisch/qfieldcloud:latest
    container_name: slt-qfield-worker
    restart: unless-stopped
    command: celery -A qfieldcloud worker -l INFO
    depends_on:
      qfield-db:
        condition: service_healthy
      qfield-storage:
        condition: service_healthy
    environment:
      DEBUG: "false"
      SECRET_KEY: ${QFIELD_SECRET_KEY:-change_this_to_a_long_random_string}
      DATABASE_URL: postgres://qfield:${QFIELD_DB_PASSWORD:-qfield_password_change_me}@qfield-db:5432/qfieldcloud
      STORAGE_ACCESS_KEY_ID: ${QFIELD_STORAGE_USER:-qfield_admin}
      STORAGE_SECRET_ACCESS_KEY: ${QFIELD_STORAGE_PASSWORD:-qfield_storage_change_me}
      STORAGE_BUCKET_NAME: qfieldcloud
      STORAGE_ENDPOINT: http://qfield-storage:9000
      STORAGE_REGION: us-east-1
      QFIELDCLOUD_HOST: ${QFIELD_HOST:-http://localhost:8100}
    volumes:
      - qfield_media:/app/media
      - qfield_static:/app/static

volumes:
  qfield_db_data:
    driver: local
  qfield_storage_data:
    driver: local
  qfield_media:
    driver: local
  qfield_static:
    driver: local