name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir staging
          cp -r .next/standalone/* staging/
          cp -r public staging/
          cp -r .next/static staging/.next/
          cp -r prisma staging/
          cp docker-entrypoint.sh staging/
          cp Dockerfile.prod staging/
          
          # Use a safer Node script to fix absolute paths without corrupting files
          node -e "
            const fs = require('fs');
            const path = '/app';
            const workspace = process.env.GITHUB_WORKSPACE;
            
            ['staging/server.js', 'staging/.next/required-server-files.json'].forEach(file => {
              if (fs.existsSync(file)) {
                let content = fs.readFileSync(file, 'utf8');
                // Replace escaped backslashes and normal forward slashes
                const escapedWorkspace = workspace.replace(/\\\\/g, '\\\\\\\\').replace(/\//g, '\\\\/');
                const regex = new RegExp(workspace.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\\\$&'), 'g');
                content = content.replace(regex, path);
                fs.writeFileSync(file, content);
                console.log('Fixed paths in: ' + file);
              }
            });
          "
          
          cd staging && zip -r ../deploy.zip .

      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip,docker-compose.prod.yml,.env"
          target: "/tmp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create app directory if not exists
            mkdir -p ~/slts-erp
            
            # STOP and WIPE everything to ensure no corruption remains
            cd ~/slts-erp
            sudo docker compose -f docker-compose.prod.yml down || true
            
            # Backup .env if exists, then wipe
            [ -f .env ] && cp .env /tmp/.env.bak
            cd ~
            sudo rm -rf ~/slts-erp/*
            
            # Move new files and extract
            mv /tmp/deploy.zip ~/slts-erp/
            mv /tmp/docker-compose.prod.yml ~/slts-erp/
            mv /tmp/.env ~/slts-erp/ || mv /tmp/.env.bak ~/slts-erp/.env
            
            cd ~/slts-erp
            sudo apt-get install -y unzip
            unzip -o deploy.zip -d .
            
            # Start fresh
            sudo docker compose -f docker-compose.prod.yml up -d --build
