name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for build
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Build Next.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir -p deploy

          # ✅ Next.js standalone output (contains server.js)
          cp -r .next/standalone/. deploy/

          # 🔥 Ensure prisma CLI is present for DB sync inside container
          mkdir -p deploy/node_modules/.bin
          cp -r node_modules/prisma deploy/node_modules/ || true
          cp -r node_modules/.bin/prisma deploy/node_modules/.bin/ || true

          # ✅ Static assets MUST be inside deploy/.next/static
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/

          # ✅ Public folder for static files
          cp -r public deploy/

          # ✅ Prisma schema for DB sync inside container
          cp -r prisma deploy/

          # ✅ DB sync script
          mkdir -p deploy/scripts
          cp -r scripts/. deploy/scripts/

          # ✅ Docker production files
          cp Dockerfile.prod deploy/
          cp docker-compose.prod.yml deploy/
          cp docker-entrypoint.sh deploy/
          cp .env deploy/

          # ✅ CRITICAL: nginx folder required by docker-compose.prod.yml
          cp -r nginx deploy/

          # Create zip
          cd deploy && zip -r ../deploy.zip .

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip"
          target: "/tmp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/slts-erp
            cd ~/slts-erp
            sudo docker compose -f docker-compose.prod.yml down || true
            sudo rm -rf ~/slts-erp/*
            mv /tmp/deploy.zip ~/slts-erp/
            sudo apt-get install -y unzip -y
            unzip -o deploy.zip -d .
            # Start all containers (nginx, app, postgres, redis)
            sudo docker compose -f docker-compose.prod.yml up -d --build
            # Wait for app to be ready, then run DB sync inside container
            echo "⏳ Waiting for app container..."
            sleep 20
            echo "🔄 Running DB sync inside app container..."
            sudo docker compose -f docker-compose.prod.yml exec -T app node scripts/db-sync.js || echo "⚠️ DB sync skipped"
