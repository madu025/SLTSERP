name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Suggested by GH to avoid deprecation warnings
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Back to 20 for project compatibility
          cache: 'npm'

      - name: Install Dependencies
        run: npm install # Using install instead of ci for better cross-platform compatibility

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Prepare Deployment Artifacts
        run: |
          echo "Checking build output..."
          if [ ! -d ".next/standalone" ]; then
            echo "Error: .next/standalone not found. Ensure output: 'standalone' is set in next.config.ts"
            exit 1
          fi
          
          # Copy public and static files into the standalone folder
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # Copy prisma for migrations
          cp -r prisma .next/standalone/
          cp package.json .next/standalone/
          
          # Create compressed archive
          tar -czf full_deploy.tar.gz -C .next/standalone .
          echo "Archive created successfully."

      - name: Transfer Artifacts to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "full_deploy.tar.gz"
          target: "/tmp"

      - name: Finalize Deployment on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Stop on any error
            mkdir -p ~/slts-erp
            # Extract new version
            tar -xzf /tmp/full_deploy.tar.gz -C ~/slts-erp
            cd ~/slts-erp
            # Install production dependencies only
            npm install --production --no-package-lock
            npx prisma migrate deploy
            # Restart or Start
            sudo pm2 restart slts-erp || sudo pm2 start server.js --name "slts-erp" -- --port 80
            # Cleanup
            rm /tmp/full_deploy.tar.gz
