name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir staging
          cp -r .next/standalone/* staging/
          cp -r public staging/
          cp -r .next/static staging/.next/
          cp -r prisma staging/
          cp docker-entrypoint.sh staging/
          cp Dockerfile.prod staging/
          
          # Fix absolute paths from GitHub runner to Docker /app path
          # We use a placeholder and then sed to avoid escape issues
          find staging -type f \( -name "server.js" -o -name "required-server-files.json" \) -exec sed -i "s|$GITHUB_WORKSPACE|/app|g" {} +
          # Also handle potential escaped backslashes if any (though unlikely on Linux runner)
          
          cd staging && zip -r ../deploy.zip .

      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip,docker-compose.prod.yml,.env"
          target: "~/slts-erp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/slts-erp
            # Clean up old node_modules to avoid permission issues during unzip
            sudo rm -rf node_modules
            sudo apt-get install -y unzip
            unzip -o deploy.zip -d .
            sudo docker compose -f docker-compose.prod.yml up -d --build
