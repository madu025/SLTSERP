name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Updated to Node 22 to avoid deprecation warnings
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install # Fallback if package-lock is missing

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Prepare Deployment Artifacts
        run: |
          # Next.js standalone folder optimization
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # Copy prisma and package files into standalone to ensure they are available in extract
          cp -r prisma .next/standalone/
          cp package.json .next/standalone/
          
          # Create compressed archive from INSIDE the standalone folder
          tar -czf full_deploy.tar.gz -C .next/standalone .

      - name: Transfer Artifacts to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "full_deploy.tar.gz"
          target: "/tmp"

      - name: Finalize Deployment on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/slts-erp
            # Extract and update
            tar -xzf /tmp/full_deploy.tar.gz -C ~/slts-erp
            cd ~/slts-erp
            # Install production dependencies only (much faster)
            npm install --production --no-package-lock
            npx prisma migrate deploy
            # Use standalone server entry point
            sudo pm2 restart slts-erp || sudo pm2 start server.js --name "slts-erp" -- --port 80
            # Cleanup
            rm /tmp/full_deploy.tar.gz
