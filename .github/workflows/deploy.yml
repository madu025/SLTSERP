name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for build
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Build Next.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir -p deploy
          # Copy essential files for production
          cp -r .next deploy/
          cp -r public deploy/ || true
          cp -r prisma deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.js deploy/ || true
          cp docker-compose.prod.yml deploy/ || true
          cp .env deploy/
          cp -r scripts deploy/ || true
          # CRITICAL: nginx folder is required by docker-compose.prod.yml
          cp -r nginx deploy/
          cd deploy && zip -r ../deploy.zip .

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip,docker-compose.prod.yml,.env"
          target: "/tmp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/slts-erp
            cd ~/slts-erp
            sudo docker compose -f docker-compose.prod.yml down || true
            sudo rm -rf ~/slts-erp/*
            mv /tmp/deploy.zip ~/slts-erp/
            mv /tmp/docker-compose.prod.yml ~/slts-erp/
            mv /tmp/.env ~/slts-erp/
            sudo apt-get install -y unzip
            unzip -o deploy.zip -d .
            # Start containers first (app container has Node.js + can reach postgres internally)
            sudo docker compose -f docker-compose.prod.yml up -d --build
            # Wait for app container to be healthy then run DB sync inside container
            echo "⏳ Waiting for app container to start..."
            sleep 15
            echo "🔄 Running database sync inside app container..."
            sudo docker compose -f docker-compose.prod.yml exec -T app node scripts/db-sync.js || echo "⚠️ DB sync warning"
