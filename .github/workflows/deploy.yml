name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir staging
          cp -r .next/standalone/. staging/
          
          # Inject robust server.js
          cat << 'EOF' > staging/server.js
          const path = require('path')
          const fs = require('fs')
          const dir = path.join(__dirname)
          process.env.NODE_ENV = 'production'
          process.chdir(__dirname)
          const currentPort = parseInt(process.env.PORT, 10) || 3000
          const hostname = process.env.HOSTNAME || '0.0.0.0'
          const configPath = path.join(dir, '.next/required-server-files.json')
          const requiredFiles = JSON.parse(fs.readFileSync(configPath, 'utf8'))
          requiredFiles.config.turbopack = { root: '/app' }
          requiredFiles.appDir = '/app'
          const nextConfig = requiredFiles.config
          process.env.__NEXT_PRIVATE_STANDALONE_CONFIG = JSON.stringify(nextConfig)
          require('next')
          const { startServer } = require('next/dist/server/lib/start-server')
          let keepAliveTimeout = parseInt(process.env.KEEP_ALIVE_TIMEOUT, 10)
          if (Number.isNaN(keepAliveTimeout) || !Number.isFinite(keepAliveTimeout) || keepAliveTimeout < 0) {
            keepAliveTimeout = undefined
          }
          console.log('🚀 Starting SLTSERP Standalone Server on', hostname, 'port', currentPort)
          startServer({
            dir,
            isDev: false,
            config: nextConfig,
            hostname,
            port: currentPort,
            allowRetry: false,
            keepAliveTimeout,
          }).catch((err) => {
            console.error(err)
            process.exit(1)
          })
          EOF
          
          # Add assets
          mkdir -p staging/public
          cp -r public/. staging/public/ || true
          mkdir -p staging/.next/static
          cp -r .next/static/. staging/.next/static/ || true
          
          # Add config and scripts
          cp -r nginx staging/
          cp -r prisma staging/
          cp docker-entrypoint.sh staging/
          cp Dockerfile.prod staging/
          
          cd staging && zip -r ../deploy.zip .

      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip,docker-compose.prod.yml,.env"
          target: "/tmp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/slts-erp
            cd ~/slts-erp
            sudo docker compose -f docker-compose.prod.yml down || true
            sudo rm -rf ~/slts-erp/*
            mv /tmp/deploy.zip ~/slts-erp/
            mv /tmp/docker-compose.prod.yml ~/slts-erp/
            mv /tmp/.env ~/slts-erp/
            sudo apt-get install -y unzip
            unzip -o deploy.zip -d .
            sudo docker compose -f docker-compose.prod.yml up -d --build
