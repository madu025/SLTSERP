global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: ${GRAFANA_CLOUD_REMOTE_WRITE_URL}
    basic_auth:
      username: ${GRAFANA_CLOUD_USERNAME}
      password: ${GRAFANA_CLOUD_PASSWORD}

scrape_configs:
  - job_name: 'sltserp_nextjs'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']
